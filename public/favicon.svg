<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162a4a"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9933"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#138808"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- Bridge arch -->
  <path d="M30 130 Q96 50 162 130" stroke="url(#bridge)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Bridge pillars -->
  <line x1="55" y1="105" x2="55" y2="140" stroke="#FF9933" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="80" x2="96" y2="140" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <line x1="137" y1="105" x2="137" y2="140" stroke="#138808" stroke-width="4" stroke-linecap="round"/>
  <!-- Base line -->
  <line x1="25" y1="140" x2="167" y2="140" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Setu text -->
  <text x="96" y="170" text-anchor="middle" fill="#FF9933" font-family="sans-serif" font-size="18" font-weight="bold">सेतु</text>
</svg>
