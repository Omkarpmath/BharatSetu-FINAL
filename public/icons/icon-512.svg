<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#162a4a"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9933"/>
      <stop offset="50%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#138808"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Bridge arch -->
  <path d="M80 340 Q256 120 432 340" stroke="url(#bridge)" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Bridge pillars -->
  <line x1="148" y1="270" x2="148" y2="370" stroke="#FF9933" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="190" x2="256" y2="370" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  <line x1="364" y1="270" x2="364" y2="370" stroke="#138808" stroke-width="10" stroke-linecap="round"/>
  <!-- Base line -->
  <line x1="60" y1="370" x2="452" y2="370" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  <!-- Bharat Setu text -->
  <text x="256" y="440" text-anchor="middle" fill="white" font-family="sans-serif" font-size="36" font-weight="700">BHARAT</text>
  <text x="256" y="475" text-anchor="middle" fill="#FF9933" font-family="sans-serif" font-size="32" font-weight="800">सेतु</text>
</svg>
